# BUMP
name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libxkbcommon-dev libwayland-dev pkg-config

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        id: build
        run: |
          set -o pipefail
          cargo build --release 2>&1 | tee build.log
        shell: bash

      - name: Upload artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: aktools-build
          path: target/release/
          if-no-files-found: ignore
          retention-days: 30

      - name: Bump version
        id: bump_version
        if: success() && github.event_name != 'pull_request'
        run: |
          git fetch --tags
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.00")
          echo "Last tag: $LAST_TAG"
          IFS='.' read -r major minor <<< "${LAST_TAG#v}"
          NEW_MINOR=$(printf "%02d" $((10#$minor + 1)))
          NEW_TAG="v${major}.${NEW_MINOR}"
          echo "New tag: $NEW_TAG"
          
          # Check if tag already exists
          if git rev-parse "$NEW_TAG" >/dev/null 2>&1; then
            echo "Tag $NEW_TAG already exists, using existing tag"
            NEW_TAG=$(git describe --tags --abbrev=0)
            echo "NEW_TAG=$NEW_TAG" >> $GITHUB_OUTPUT
          else
            echo "NEW_TAG=$NEW_TAG" >> $GITHUB_OUTPUT
            git tag $NEW_TAG
            git push origin $NEW_TAG
          fi

      - name: Create Release
        if: success() && github.event_name != 'pull_request'
        id: create_release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.bump_version.outputs.NEW_TAG }}
          name: ${{ steps.bump_version.outputs.NEW_TAG }}
          artifacts: target/release/*
          artifactContentType: application/octet-stream
          generateReleaseNotes: true

      - name: Update Homebrew tap
        if: success() && github.event_name != 'pull_request'
        env:
          HOMEBREW_TAP_REPO: Akinus21/homebrew-tap
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.bump_version.outputs.NEW_TAG }}"
          VERSION="${TAG#v}"
          
          # Get download URL
          DOWNLOAD_URL="https://github.com/Akinus21/aktools/releases/download/${TAG}/aktools-${VERSION}-linux-x86_64.tar.gz"
          
          # Download and calculate SHA256
          curl -sL "$DOWNLOAD_URL" -o /tmp/aktools.tar.gz
          SHA=$(sha256sum /tmp/aktools.tar.gz | cut -d' ' -f1)
          echo "SHA256: $SHA"
          
          # Clone tap repo
          git clone "https://github.com/${HOMEBREW_TAP_REPO}.git" /tmp/homebrew-tap
          cd /tmp/homebrew-tap
          
          # Update formula
          sed -i "s/version \".*\"/version \"${VERSION}\"/" Formula/aktools.rb
          sed -i "s|https://github.com/Akinus21/aktools/releases/download/.*/aktools-|https://github.com/Akinus21/aktools/releases/download/${TAG}/aktools-|" Formula/aktools.rb
          sed -i "s|sha256 \".*\"|sha256 \"${SHA}\"|" Formula/aktools.rb
          
          # Commit and push
          git config user.email "aktags-bot@akinus21.com"
          git config user.name "AkTags Bot"
          git add -A
          git commit -m "Update aktools to ${TAG}"
          git push https://x-access-token:$GH_TOKEN@github.com/${HOMEBREW_TAP_REPO}.git master

      - name: Notify webhook on failure
        if: failure() && github.ref == 'refs/heads/main'
        env:
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_HMAC_SECRET }}
        run: |
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          SHA="${{ github.sha }}"
          COMMIT_MSG=$(git log -1 --pretty=format:"%s" "$SHA" 2>/dev/null || echo "unknown")
          ERRORS=$(cat build.log 2>/dev/null | tail -200 | jq -Rs . || echo 'build log not found')

          PAYLOAD=$(jq -cn \
            --arg run_url "$RUN_URL" \
            --arg sha "$SHA" \
            --arg commit_msg "$COMMIT_MSG" \
            --arg ref "${{ github.ref_name }}" \
            --arg actor "${{ github.actor }}" \
            --arg errors "$ERRORS" \
            '{
              run_url: $run_url,
              sha: $sha,
              commit_msg: $commit_msg,
              ref: $ref,
              actor: $actor,
              errors: $errors
            }')

          SIG=$(printf '%s' "$PAYLOAD" | \
            openssl dgst -sha256 -hmac "$WEBHOOK_SECRET" | \
            awk '{print "sha256="$2}')

          curl -fsSL -X POST \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Event: build_failure" \
            -H "X-Hub-Signature-256: $SIG" \
            -d "$PAYLOAD" \
            "https://webhook.akinus21.com/webhook/aktools-build" || true

      - name: Notify webhook on success
        if: success() && github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        env:
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_HMAC_SECRET }}
        run: |
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          SHA="${{ github.sha }}"
          COMMIT_MSG=$(git log -1 --pretty=format:"%s" "$SHA" 2>/dev/null || echo "unknown")

          PAYLOAD=$(jq -cn \
            --arg run_url "$RUN_URL" \
            --arg sha "$SHA" \
            --arg commit_msg "$COMMIT_MSG" \
            --arg ref "${{ github.ref_name }}" \
            --arg actor "${{ github.actor }}" \
            '{
              event: "build_success",
              run_url: $run_url,
              sha: $sha,
              commit_msg: $commit_msg,
              ref: $ref,
              actor: $actor
            }')

          SIG=$(printf '%s' "$PAYLOAD" | \
            openssl dgst -sha256 -hmac "$WEBHOOK_SECRET" | \
            awk '{print "sha256="$2}')

          curl -fsSL -X POST \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Event: build_success" \
            -H "X-Hub-Signature-256: $SIG" \
            -d "$PAYLOAD" \
            "https://webhook.akinus21.com/webhook/aktools-build" || true
