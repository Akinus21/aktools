name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-tags: true
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libxkbcommon-dev libwayland-dev pkg-config jq

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        id: build
        run: |
          set -o pipefail
          cargo build --release 2>&1 | tee build.log
        shell: bash

      - name: Upload artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: aktools-build
          path: target/release/aktools
          if-no-files-found: error
          retention-days: 30

      - name: Notify webhook on failure
        if: failure() && github.ref == 'refs/heads/main'
        env:
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_HMAC_SECRET }}
        run: |
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          SHA="${{ github.sha }}"
          COMMIT_MSG=$(git log -1 --pretty=format:"%s" "$SHA" 2>/dev/null || echo "unknown")
          ERRORS=$(cat build.log 2>/dev/null | tail -200 | jq -Rs . || echo '"build log not found"')

          PAYLOAD=$(jq -cn \
            --arg run_url "$RUN_URL" \
            --arg sha "$SHA" \
            --arg commit_msg "$COMMIT_MSG" \
            --arg ref "${{ github.ref_name }}" \
            --arg actor "${{ github.actor }}" \
            --argjson errors "$ERRORS" \
            '{run_url:$run_url,sha:$sha,commit_msg:$commit_msg,ref:$ref,actor:$actor,errors:$errors}')

          SIG=$(printf '%s' "$PAYLOAD" | \
            openssl dgst -sha256 -hmac "$WEBHOOK_SECRET" | \
            awk '{print "sha256="$2}')

          curl -fsSL -X POST \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Event: build_failure" \
            -H "X-Hub-Signature-256: $SIG" \
            -d "$PAYLOAD" \
            "https://webhook.akinus21.com/webhook/aktools-build" || true

      - name: Notify webhook on success
        if: success() && github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        env:
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_HMAC_SECRET }}
        run: |
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          SHA="${{ github.sha }}"
          COMMIT_MSG=$(git log -1 --pretty=format:"%s" "$SHA" 2>/dev/null || echo "unknown")

          PAYLOAD=$(jq -cn \
            --arg run_url "$RUN_URL" \
            --arg sha "$SHA" \
            --arg commit_msg "$COMMIT_MSG" \
            --arg ref "${{ github.ref_name }}" \
            --arg actor "${{ github.actor }}" \
            '{event:"build_success",run_url:$run_url,sha:$sha,commit_msg:$commit_msg,ref:$ref,actor:$actor}')

          SIG=$(printf '%s' "$PAYLOAD" | \
            openssl dgst -sha256 -hmac "$WEBHOOK_SECRET" | \
            awk '{print "sha256="$2}')

          curl -fsSL -X POST \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Event: build_success" \
            -H "X-Hub-Signature-256: $SIG" \
            -d "$PAYLOAD" \
            "https://webhook.akinus21.com/webhook/aktools-build" || true

      - name: Compute new tag
        if: success() && github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        id: tag
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.00.0")
          VERSION=$(echo "$PREV_TAG" | sed 's/^v//')
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)
          PATCH=$((10#$PATCH + 1))
          NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT

      - name: Tag and create GitHub release with binary
        if: success() && github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NEW_TAG="${{ steps.tag.outputs.new_tag }}"
          BINARY="target/release/aktools"

          if [ ! -s "$BINARY" ]; then
            echo "ERROR: Binary missing or empty at $BINARY"
            exit 1
          fi

          SHA256=$(sha256sum "$BINARY" | awk '{print $1}')
          echo "Binary size: $(stat -c%s "$BINARY") bytes"
          echo "SHA256: $SHA256"

          git tag -a "$NEW_TAG" -m "Release $NEW_TAG"
          git push origin "$NEW_TAG"

          gh release create "$NEW_TAG" \
            --title "$NEW_TAG" \
            --notes "" \
            "$BINARY#aktools"

          echo "sha256=$SHA256" >> $GITHUB_OUTPUT
          echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT
        id: release

      - name: Update homebrew tap
        if: success() && github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        env:
          TAP_TOKEN: ${{ secrets.TAP_TOKEN }}
        run: |
          NEW_TAG="${{ steps.tag.outputs.new_tag }}"
          SHA256="${{ steps.release.outputs.sha256 }}"
          BINARY_URL="https://github.com/Akinus21/aktools/releases/download/${NEW_TAG}/aktools"

          git clone https://x-access-token:${TAP_TOKEN}@github.com/Akinus21/homebrew-tap.git /tmp/homebrew-tap
          cd /tmp/homebrew-tap

          cat > Formula/aktools.rb <<EOF
          class Aktools < Formula
            desc "Modular CLI tool runner with module registry"
            homepage "https://github.com/Akinus21/aktools"
            version "${NEW_TAG#v}"
            url "${BINARY_URL}"
            sha256 "${SHA256}"
            def install
              bin.install "aktools"
            end
            test do
              system bin/"aktools", "--version"
            end
          end
          EOF

          git config user.email "github-actions@github.com"
          git config user.name "github-actions"
          git add Formula/aktools.rb
          git commit -m "Update aktools to ${NEW_TAG}"
          git push