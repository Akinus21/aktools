name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libxkbcommon-dev libwayland-dev pkg-config

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        id: build
        run: |
          set -o pipefail
          cargo build --release 2>&1 | tee build.log
        shell: bash

      - name: Upload artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: aktools-build
          path: target/release/
          if-no-files-found: ignore
          retention-days: 30

      - name: Create incremented release
        if: success() && github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.email "aktags-bot@akinus21.com"
          git config --global user.name "AkTags Bot"

          git fetch --tags

          find_next_tag() {
            local last_tag="$1"
            MAJOR=$(echo "$last_tag" | sed 's/v//' | cut -d. -f1)
            MINOR=$(echo "$last_tag" | sed 's/v//' | cut -d. -f2)
            PATCH=$(echo "$last_tag" | sed 's/v//' | cut -d. -f3)
            PATCH=$((PATCH + 1))
            echo "v${MAJOR}.${MINOR}.${PATCH}"
          }

          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.00.0")
          NEW_TAG=$(find_next_tag "$LAST_TAG")

          while git rev-parse "$NEW_TAG" >/dev/null 2>&1; do
            echo "Tag $NEW_TAG exists, finding next..."
            LAST_TAG="$NEW_TAG"
            NEW_TAG=$(find_next_tag "$NEW_TAG")
          done

          echo "NEW_TAG=$NEW_TAG" >> $GITHUB_ENV
          git tag -a "$NEW_TAG" -m "Release $NEW_TAG"
          git push origin "$NEW_TAG"

      - name: Create GitHub Release
        if: success() && github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.NEW_TAG }}
          name: ${{ env.NEW_TAG }}
          files: target/release/aktools
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Homebrew tap
        if: success() && github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        env:
          HOMEBREW_TAP_REPO: Akinus21/homebrew-tap
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          TAG="${{ env.NEW_TAG }}"
          VERSION="${TAG#v}"

          curl -sL "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/releases/download/$TAG/aktools" -o /tmp/aktools
          SHA=$(sha256sum /tmp/aktools | cut -d' ' -f1)
          echo "SHA256: $SHA"

          git clone "https://x-access-token:${TAP_TOKEN}@github.com/${HOMEBREW_TAP_REPO}.git" /tmp/homebrew-tap
          cd /tmp/homebrew-tap

          sed -i "s/version \".*\"/version \"${VERSION}\"/" Formula/aktools.rb
          sed -i 's|url "https://github.com/Akinus21/aktools/releases/download/[^"]*"|url "https://github.com/Akinus21/aktools/releases/download/'"${TAG}"'/aktools"|' Formula/aktools.rb
          sed -i "s|sha256 \".*\"|sha256 \"${SHA}\"|" Formula/aktools.rb

          git config user.email "aktags-bot@akinus21.com"
          git config user.name "AkTags Bot"
          git add -A
          git commit -m "Update aktools to ${TAG}"
          git push https://x-access-token:$TAP_TOKEN@github.com/${HOMEBREW_TAP_REPO}.git master

      - name: Notify webhook on failure
        if: failure()
        env:
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_HMAC_SECRET }}
        run: |
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          BUILD_SHA="${{ github.sha }}"
          COMMIT_MSG=$(git log -1 --pretty=format:"%s" "$BUILD_SHA" 2>/dev/null || echo "unknown")
          ERRORS=$(cat build.log 2>/dev/null | tail -200 | jq -Rs . || echo 'build log not found')

          PAYLOAD=$(jq -cn \
            --arg run_url "$RUN_URL" \
            --arg sha "$BUILD_SHA" \
            --arg commit_msg "$COMMIT_MSG" \
            --arg ref "${{ github.ref_name }}" \
            --arg actor "${{ github.actor }}" \
            --arg errors "$ERRORS" \
            '{run_url: $run_url, sha: $sha, commit_msg: $commit_msg, ref: $ref, actor: $actor, errors: $errors}')

          SIG=$(printf '%s' "$PAYLOAD" | openssl dgst -sha256 -hmac "$WEBHOOK_SECRET" | awk '{print "sha256="$2}')

          echo "Sending failure webhook..."
          echo "Payload: $PAYLOAD"
          curl -fsSL -X POST \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Event: build_failure" \
            -H "X-Hub-Signature-256: $SIG" \
            -d "$PAYLOAD" \
            "https://webhook.akinus21.com/webhook/aktools-build" || echo "Webhook failed but continuing"

      - name: Notify webhook on success
        if: success() && github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        env:
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_HMAC_SECRET }}
        run: |
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          BUILD_SHA="${{ github.sha }}"
          COMMIT_MSG=$(git log -1 --pretty=format:"%s" "$BUILD_SHA" 2>/dev/null || echo "unknown")

          PAYLOAD=$(jq -cn \
            --arg run_url "$RUN_URL" \
            --arg sha "$BUILD_SHA" \
            --arg commit_msg "$COMMIT_MSG" \
            --arg ref "${{ github.ref_name }}" \
            --arg actor "${{ github.actor }}" \
            '{event: "build_success", run_url: $run_url, sha: $sha, commit_msg: $commit_msg, ref: $ref, actor: $actor}')

          SIG=$(printf '%s' "$PAYLOAD" | openssl dgst -sha256 -hmac "$WEBHOOK_SECRET" | awk '{print "sha256="$2}')

          curl -fsSL -X POST \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Event: build_success" \
            -H "X-Hub-Signature-256: $SIG" \
            -d "$PAYLOAD" \
            "https://webhook.akinus21.com/webhook/aktools-build" || true